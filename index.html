<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>王鈺凱個人網站</title>
<style>
    body {
        margin: 0;
        font-family: "Microsoft JhengHei", Arial, sans-serif;
        background-color: #f5f5f5;
    }

    header {
        /* 這裡把黑色改成了灰色 (#555555) */
        background: #555555; 
        color: white;
        padding: 30px;
        text-align: center;
        letter-spacing: 2px;
    }

    .layout {
        display: flex;
        min-height: 90vh;
    }

    /* 側邊欄 */
    .sidebar {
        width: 200px;
        background: #e9ecef;
        padding-top: 20px;
        border-right: 1px solid #ddd;
    }

    .sidebar button {
        display: block;
        width: 100%;
        padding: 15px;
        border: none;
        background: none;
        cursor: pointer;
        text-align: left;
        font-size: 16px;
        font-weight: bold;
        color: #333;
    }

    .sidebar button:hover,
    .sidebar button.active {
        /* 選中時也用灰色呼應標題 */
        background: #555555;
        color: white;
    }

    /* 內容區 */
    .content-area {
        flex: 1;
        padding: 40px;
        background: white;
    }

    .content {
        display: none;
    }

    .content.active {
        display: block;
    }

    h2 {
        border-left: 5px solid #555555;
        padding-left: 10px;
        margin-bottom: 20px;
    }

    /* 圖片樣式設定 */
    .my-photo {
        max-width: 300px; /* 限制寬度 */
        height: auto;
        border-radius: 10px; /* 圓角比較好看 */
        box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        margin: 20px 0;
        display: block;
    }

    /* 手機版適應 */
    @media (max-width: 768px) {
        .layout { flex-direction: column; }
        .sidebar { width: 100%; height: auto; }
    }
</style>
</head>
<body>

<header>
    <h1>11327057 王鈺凱</h1>
</header>

<div class="layout">
    <div class="sidebar">
        <button class="tabBtn active" onclick="showTab(0)">個人簡介</button>
        <button class="tabBtn" onclick="showTab(1)">興趣專長</button>
    </div>

    <div class="content-area">
        <div class="content active">
            <h2>關於我</h2>
            <p>我叫王鈺凱，就讀朝陽科技大學資訊工程系二年級。</p>
            
            <img src="my_photo.jpg" alt="我的個人照" class="my-photo" onerror="this.src='https://via.placeholder.com/300x200?text=圖片檔案名稱需與程式碼一致'">
        </div>

        <div class="content">
            <h2>興趣專長</h2>
            <p>我喜歡棒球、讀書、下棋、打籃球。</p>
        </div>
    </div>
</div>

<script>
function showTab(index){
    const contents = document.querySelectorAll('.content');
    const buttons = document.querySelectorAll('.tabBtn');
    contents.forEach(c => c.classList.remove('active'));
    buttons.forEach(b => b.classList.remove('active'));
    contents[index].classList.add('active');
    buttons[index].classList.add('active');
}
</script>

</body>
</html>
